# Configuración del Servidor
server.port=8080

# Conexión a MySQL (El parámetro createDatabaseIfNotExist crea la BD automáticamente)
spring.datasource.url=jdbc:mysql://localhost:3306/denuncia_segura_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate / JPA (Convierte tus clases Java a tablas SQL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect